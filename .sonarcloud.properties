# Automatic SonarCloud analysis configuration.
#
# The runtime workspace contains mirrored bootstrap assets that are copied into
# every standalone workspace. The installer test suites also mirror Unix and
# Windows scenarios intentionally. Excluding those files from duplication
# analysis keeps the quality gate focused on actual maintainability regressions
# instead of product-required mirrored assets.

sonar.tests=tests
sonar.cpd.exclusions=runtime/workspace/setup.ps1,setup.ps1,install.ps1,tests/unit/test_install.py,tests/unit/test_install_windows.py
